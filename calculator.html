<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: skyblue;
        }
        .container{
            width: 350px;
            height: 450px;
            border: 2px solid black;
            background-color: aliceblue;
            
        
            
    
    }
    header{
display: flex;
        justify-content: center;

        border: 1px solid black;
        border-radius: 5px;
        margin-top: 10px;
        margin-left: 30px;
            font-size: larger;

        
    }
    .box{
        width: 50px;
        height: 50px;
        border: 1px solid black;

        justify-content: center;
        align-items: center;
    }
    .r1,.r2,.r3,.r4{

    }
    .v2{
        width: 150px;
        height: 40px;
        border: 1px solid black;
        border-radius: 5px;
        margin-left: 29px;
        display: flex;
        justify-content: center;
        align-items: center;

    }

</head>
<body>
    <header>
    <div class="container">
        <div class="box1">4+3</div>
        
            
 <div class="r1">

<div style="background-color: yellow;"class="box">-</div>
<div style="background-color: yellow;"class="box">*</div>
<div style="background-color: yellow;"class="box">/</div> 

 </div>
 <div class="r2"  >

 </div>
 <div class="r3">

<div style="background-color: skyblue;" class="box">7</div>
<div style="background-color: skyblue;" class="box">8</div> 

 </div>
 <div class="r4">
     <div style="background-color: skyblue;" class="box">9</div>
<div style="background-color: skyblue;" class="box">0</div>
<div style="background-color: skyblue;" class="box">.</div>
<div style="background-color: red;" class="box">c</div> 
 </div>
 <div style="background-color: green;" class="v2">=</div>
        

    </div>
    </header>
    
</body>
